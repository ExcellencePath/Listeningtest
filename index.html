<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Test — Excellence Path</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #e8f7f7, #f0fafa);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* LOGIN */
.login-card {
  background: white; border-radius: 24px; padding: 40px 32px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(59,191,191,0.15);
  text-align: center; animation: fadeUp 0.5s ease;
}
.logo { width:100px; height:100px; border-radius:50%; overflow:hidden; margin:0 auto 16px; border:3px solid #e8f7f7; box-shadow:0 8px 24px rgba(59,191,191,0.3); }
.logo img { width:100%; height:100%; object-fit:cover; }
h1 { font-size:24px; font-weight:900; color:#2a9d9d; margin-bottom:4px; }
.sub { font-size:13px; color:#7f8c8d; margin-bottom:24px; }
.form-group { text-align:left; margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:700; color:#2c3e50; margin-bottom:6px; }
.form-group input { width:100%; padding:12px 16px; border:2px solid #e8f0f0; border-radius:12px; font-size:14px; background:#f4f8f8; outline:none; }
.form-group input:focus { border-color:#3BBFBF; background:white; }
.btn-main { width:100%; padding:14px; background:linear-gradient(135deg,#3BBFBF,#2a9d9d); color:white; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 8px 20px rgba(59,191,191,0.35); }
.err { color:#e74c3c; font-size:12px; margin-top:6px; display:none; }

/* QUIZ */
.quiz-card {
  background: white; border-radius: 24px;
  width: 100%; max-width: 480px;
  box-shadow: 0 20px 60px rgba(59,191,191,0.15);
  overflow: hidden; animation: fadeUp 0.5s ease;
  display: none;
}
.quiz-header {
  background: linear-gradient(135deg,#3BBFBF,#2a9d9d);
  padding: 20px 24px; color: white; text-align: center;
}
.quiz-header h2 { font-size:20px; font-weight:900; }
.student-badge { background:rgba(255,255,255,0.2); border-radius:10px; padding:5px 14px; font-size:13px; margin-top:8px; display:inline-block; }
.quiz-body { padding: 24px; }

/* AUDIO */
.audio-wrap {
  background: #e8f7f7; border-radius:16px; padding:20px;
  text-align:center; margin-bottom:24px;
}
.audio-icon { font-size:40px; margin-bottom:8px; }
.audio-title { font-size:14px; font-weight:700; color:#2a9d9d; margin-bottom:12px; }
audio { width:100%; border-radius:10px; outline:none; }
.listen-note { font-size:12px; color:#7f8c8d; margin-top:8px; }

/* QUESTION */
.q-block { margin-bottom:20px; }
.q-text { font-size:15px; font-weight:800; color:#2c3e50; margin-bottom:12px; line-height:1.6; }
.opt {
  display:block; width:100%; padding:12px 16px; margin-bottom:8px;
  border:2px solid #e8f0f0; border-radius:12px;
  background:#f4f8f8; font-size:14px; font-weight:600; color:#2c3e50;
  cursor:pointer; text-align:left; transition:all 0.2s;
}
.opt:hover { border-color:#3BBFBF; background:#e8f7f7; }
.opt.selected { background:#3BBFBF; border-color:#2a9d9d; color:white; }
.opt.correct { background:#27ae60; border-color:#1e8449; color:white; }
.opt.wrong { background:#e74c3c; border-color:#c0392b; color:white; }

.btn-submit {
  width:100%; padding:14px;
  background:linear-gradient(135deg,#3BBFBF,#2a9d9d);
  color:white; border:none; border-radius:12px;
  font-size:15px; font-weight:800; cursor:pointer;
  box-shadow:0 8px 20px rgba(59,191,191,0.35);
}
.btn-retry {
  width:100%; padding:12px; margin-top:10px;
  background:#f4f8f8; border:2px solid #e0e0e0;
  border-radius:12px; font-size:14px; font-weight:700;
  color:#888; cursor:pointer;
}

/* RESULT */
.result-wrap {
  text-align:center; padding:20px 0;
}
.result-emoji { font-size:52px; margin-bottom:8px; }
.result-title { font-size:22px; font-weight:900; color:#2c3e50; margin-bottom:4px; }
.result-sub { font-size:14px; color:#7f8c8d; }
.score-ring {
  width:100px; height:100px; border-radius:50%;
  margin:20px auto; display:flex; flex-direction:column;
  align-items:center; justify-content:center; border:6px solid;
}
.score-ring.great { border-color:#27ae60; background:#f0fff4; color:#27ae60; }
.score-ring.low { border-color:#e74c3c; background:#fff5f5; color:#e74c3c; }
.score-big { font-size:34px; font-weight:900; line-height:1; }
.score-of { font-size:12px; }
</style>
</head>

  document.getElementById("pg-quiz").style.display = "block";
  document.getElementById("student-badge").textContent = "👤 " + studentName;
});

document.getElementById("inp-name").addEventListener("keydown", function(e) {
  if (e.key === "Enter") document.getElementById("login-btn").click();
});

var opts = document.querySelectorAll(".opt");
for (var i=0; i<opts.length; i++) {
  opts[i].addEventListener("click", function() {
    if (this.classList.contains("correct") || this.classList.contains("wrong")) return;
    for (var j=0; j<opts.length; j++) opts[j].classList.remove("selected");
    this.classList.add("selected");
    selected = this.getAttribute("data-val");
  });
}

document.getElementById("submit-btn").addEventListener("click", function() {
  if (!selected) { alert("Please select an answer first!"); return; }
  for (var i=0; i<opts.length; i++) {
    opts[i].style.pointerEvents = "none";
    if (opts[i].getAttribute("data-val") === CORRECT) {
      opts[i].classList.remove("selected");
      opts[i].classList.add("correct");
    } else if (opts[i].classList.contains("selected")) {
      opts[i].classList.add("wrong");
    }
  }
  document.getElementById("submit-btn").style.display = "none";
  document.getElementById("retry-btn").style.display = "block";
});

document.getElementById("retry-btn").addEventListener("click", function() {
  selected = null;
  for (var i=0; i<opts.length; i++) {
    opts[i].classList.remove("selected","correct","wrong");
    opts[i].style.pointerEvents = "auto";
  }
  document.getElementById("submit-btn").style.display = "block";
  document.getElementById("retry-btn").style.display = "none";
});
</script>
</body>
</html>
